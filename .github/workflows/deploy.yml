name: Deploy AfricaMapping

on:
  push:
    branches: [ main ]

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - run: |
        rsync -avz public/ root@${{ secrets.SERVER_IP }}:/var/www/africamapping
